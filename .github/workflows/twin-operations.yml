name: Twin Operations

on:
  workflow_dispatch:
    inputs:
      run_seed_ingest:
        description: "Run seed job ingest"
        required: false
        default: "true"
      expire_alerts:
        description: "Expire old pending alerts"
        required: false
        default: "true"
      send_prospective_lists:
        description: "Send daily prospective (digest) lists"
        required: false
        default: "true"
      finalize_prospective_lists:
        description: "Finalize prospective lists at cutoff"
        required: false
        default: "true"
      send_prospective_results:
        description: "Send prospective results after applications finish"
        required: false
        default: "true"
      run_live_scrape:
        description: "Run live source scrape and ingest"
        required: false
        default: "false"
  schedule:
    - cron: "0 13,1 * * *"
    - cron: "15 */6 * * *"
    - cron: "0 */4 * * *"
    - cron: "*/5 * * * *"

jobs:
  ingest-seed-jobs:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 13,1 * * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.run_seed_ingest == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install apply engine dependencies
        run: ./.venv/bin/python -m pip install -r apply_engine/requirements.txt

      - name: Ingest repo seed jobs
        env:
          TWIN_APP_BASE_URL: ${{ secrets.TWIN_APP_BASE_URL }}
          APPLY_QUEUE_WORKER_SECRET: ${{ secrets.APPLY_QUEUE_WORKER_SECRET }}
        run: |
          ./.venv/bin/python apply_engine/scripts/ingest_seed_jobs.py \
            --base-url "$TWIN_APP_BASE_URL" \
            --worker-secret "$APPLY_QUEUE_WORKER_SECRET"

  expire-alerts:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '15 */6 * * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.expire_alerts == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Expire stale alerts
        env:
          TWIN_APP_BASE_URL: ${{ secrets.TWIN_APP_BASE_URL }}
          APPLY_QUEUE_WORKER_SECRET: ${{ secrets.APPLY_QUEUE_WORKER_SECRET }}
        run: |
          curl --fail --show-error --silent \
            -X POST \
            -H "Authorization: Bearer $APPLY_QUEUE_WORKER_SECRET" \
            "$TWIN_APP_BASE_URL/api/internal/cron/expire-alerts"

  scrape-live-sources:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 */4 * * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.run_live_scrape == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install scraper dependencies
        run: ./.venv/bin/python -m pip install -r scraper/requirements.txt

      - name: Scrape and ingest live sources
        env:
          TWIN_BASE_URL: ${{ secrets.TWIN_APP_BASE_URL }}
          TWIN_WORKER_SECRET: ${{ secrets.APPLY_QUEUE_WORKER_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          ./.venv/bin/python -m scraper.run_scrape \
            --sources-file scraper/career-page-links.json \
            --base-url "$TWIN_BASE_URL" \
            --worker-secret "$TWIN_WORKER_SECRET" \
            --concurrency 20 \
            --skip-gemini

  send-prospective-lists:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '*/5 * * * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.send_prospective_lists == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Expire prospective lists (send shortlist)
        env:
          TWIN_APP_BASE_URL: ${{ secrets.TWIN_APP_BASE_URL }}
          APPLY_QUEUE_WORKER_SECRET: ${{ secrets.APPLY_QUEUE_WORKER_SECRET }}
        run: |
          curl --fail --show-error --silent \
            -X POST \
            -H "Authorization: Bearer $APPLY_QUEUE_WORKER_SECRET" \
            "$TWIN_APP_BASE_URL/api/internal/cron/send-prospective-lists"

  finalize-prospective-lists:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '*/5 * * * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.finalize_prospective_lists == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Finalize prospective lists at cutoff
        env:
          TWIN_APP_BASE_URL: ${{ secrets.TWIN_APP_BASE_URL }}
          APPLY_QUEUE_WORKER_SECRET: ${{ secrets.APPLY_QUEUE_WORKER_SECRET }}
        run: |
          curl --fail --show-error --silent \
            -X POST \
            -H "Authorization: Bearer $APPLY_QUEUE_WORKER_SECRET" \
            "$TWIN_APP_BASE_URL/api/internal/cron/finalize-prospective-lists"

  send-prospective-results:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '*/5 * * * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.send_prospective_results == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Send finalized prospective results
        env:
          TWIN_APP_BASE_URL: ${{ secrets.TWIN_APP_BASE_URL }}
          APPLY_QUEUE_WORKER_SECRET: ${{ secrets.APPLY_QUEUE_WORKER_SECRET }}
        run: |
          curl --fail --show-error --silent \
            -X POST \
            -H "Authorization: Bearer $APPLY_QUEUE_WORKER_SECRET" \
            "$TWIN_APP_BASE_URL/api/internal/cron/send-prospective-results"
