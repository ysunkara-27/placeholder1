<!doctype html>
<html>
  <body>
    <form id="application">
      <input type="text" name="first_name" autocomplete="given-name" />
      <input type="text" name="last_name" autocomplete="family-name" />
      <input type="email" name="email" id="email" />
      <input type="tel" name="phone" />
      <input type="text" name="linkedin_profile" />
      <input type="text" name="urls[Portfolio]" />
      <input type="file" name="resume" id="resume" />
      <input type="text" name="available_start_date" />
      <input type="text" name="location_preference" />
      <input type="text" name="salary_expectation" />
      <input type="text" name="school" />
      <input type="text" name="degree" />
      <input type="text" name="graduation_date" />
      <input type="text" name="gpa" />
      <input type="radio" name="willing_to_relocate" value="yes" />
      <input type="radio" name="willing_to_relocate" value="no" />
      <input type="text" name="heard_about_us" />
      <input type="text" name="weekly_availability_hours" />
      <input type="text" name="graduation_window" />
      <input type="text" name="commute_preference" />
      <input type="text" name="onsite_preference" />
      <select name="heard_about_us">
        <option value="LinkedIn">LinkedIn</option>
      </select>
      <select name="onsite_preference">
        <option value="Open to onsite">Open to onsite</option>
      </select>
      <select name="work_authorization">
        <option value="US Citizen">US Citizen</option>
      </select>
      <input type="radio" name="authorized_to_work" value="yes" />
      <input type="radio" name="authorized_to_work" value="no" />
      <input type="radio" name="sponsorship_required" value="yes" />
      <input type="radio" name="sponsorship_required" value="no" />
      <button type="submit">Submit Application</button>
    </form>
  </body>
</html>
