services:
  - type: web
    name: jobdrop
    env: python
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      python -c "import playwright; playwright.install()" || echo "Playwright install skipped for deployment"
    startCommand: gunicorn --bind 0.0.0.0:$PORT app.wsgi:app --timeout 120 --workers 1 --worker-connections 1000 --max-requests 1000 --max-requests-jitter 100
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.9.18
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: WEB_CONCURRENCY
        value: 1
    # Note: You'll need to add these environment variables in your Render dashboard:
    # 
    # Required Firebase Variables:
    # - FIREBASE_SERVICE_ACCOUNT_KEY (as secret file - entire JSON content)
    # - FIREBASE_API_KEY
    # - FIREBASE_AUTH_DOMAIN
    # - FIREBASE_PROJECT_ID
    # - FIREBASE_STORAGE_BUCKET
    # - FIREBASE_MESSAGING_SENDER_ID
    # - FIREBASE_APP_ID
    # - FIREBASE_MEASUREMENT_ID
    #
    # Optional (if using Stripe):
    # - STRIPE_PUBLISHABLE_KEY
    # - STRIPE_SECRET_KEY
    # - STRIPE_PRICE_ID
    # - STRIPE_FOREVER_PRICE_ID
    # - STRIPE_PRO_MONTHLY_PRICE_ID
    #
    # Optional (if using Gemini AI):
    # - GEMINI_API_KEY
    #
    # Optional (for Google Sheets integration):
    # - GOOGLE_API_KEY
    # - GOOGLE_SHEET_ID
    #
    # Required for session management:
    # - FLASK_SECRET_KEY (generate a secure random string) 